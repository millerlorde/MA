<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网易会议 Electron 客户端</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <h1>网易会议</h1>
            <p>Electron 客户端</p>
        </div>

        <!-- 主内容 -->
        <div class="content">
            <!-- 配置面板 - SDK 初始化 -->
            <div id="config-panel" class="panel active">
                <div class="form-group">
                    <label for="appKey">App Key</label>
                    <input 
                        type="text" 
                        id="appKey" 
                        placeholder="请输入网易会议 App Key"
                        autocomplete="off"
                    >
                </div>
                <div class="button-group">
                    <button id="save-config" class="btn-primary">初始化 SDK</button>
                </div>
            </div>

            <!-- 登录面板 -->
            <div id="login-panel" class="panel">
                <div class="form-group">
                    <label for="userUuid">User UUID</label>
                    <input 
                        type="text" 
                        id="userUuid" 
                        placeholder="请输入用户 UUID"
                        autocomplete="off"
                    >
                </div>
                <div class="form-group">
                    <label for="token">Token</label>
                    <input 
                        type="password" 
                        id="token" 
                        placeholder="请输入访问令牌"
                        autocomplete="off"
                    >
                </div>
                <div class="button-group">
                    <button id="back-to-config" class="btn-secondary">返回</button>
                    <button id="login" class="btn-primary" disabled>登录</button>
                </div>
            </div>

            <!-- 主应用面板 -->
            <div id="main-panel" class="panel">
                <div class="user-info-container">
                    <p>✓ 登录成功</p>
                    <div class="user-info-label">当前用户</div>
                    <div class="user-uuid" id="user-info">-</div>
                    <div style="margin-top: 30px;">
                        <button id="logout" class="btn-danger">退出登录</button>
                    </div>
                </div>
            </div>

            <!-- 加载指示器 -->
            <div id="loading" class="loading"></div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <span id="status-text">未初始化</span>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
